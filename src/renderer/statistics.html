<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>OptiRest — Statistics</title>
    <link rel="stylesheet" href="statistics.css">
</head>
<body>
    <div class="container" id="statsContainer">
        <div class="header-row">
            <h1>Eye Health Statistics</h1>
            <button class="share-btn" id="shareBtn">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                </svg>
                Share Stats
            </button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalBreaks">0</div>
                <div class="stat-label">Total Breaks</div>
            </div>
            <div class="stat-card green">
                <div class="stat-value" id="completedBreaks">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card red">
                <div class="stat-value" id="skippedBreaks">0</div>
                <div class="stat-label">Skipped</div>
            </div>
            <div class="stat-card blue">
                <div class="stat-value" id="complianceRate">0%</div>
                <div class="stat-label">Compliance</div>
            </div>
        </div>

        <div class="chart-container">
            <h2>Last 7 Days</h2>
            <canvas id="weekChart"></canvas>
        </div>

        <div class="last-break">
            Last break: <span id="lastBreakTime">Never</span>
        </div>
    </div>

    <!-- Share modal -->
    <div class="modal-backdrop" id="shareModal">
        <div class="share-modal">
            <div class="modal-header">
                <h3>Share Your Stats</h3>
                <button class="modal-close" id="closeModal">✕</button>
            </div>

            <div class="share-preview-box" id="sharePreview"></div>

            <p class="modal-hint">Choose a platform to share on:</p>

            <div class="platform-grid">
                <button class="platform-btn x-btn" data-platform="x">
                    <!-- X logo -->
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                    </svg>
                    <span>X (Twitter)</span>
                    <small>Up to 280 chars</small>
                </button>

                <button class="platform-btn wa-btn" data-platform="whatsapp">
                    <!-- WhatsApp logo -->
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                    </svg>
                    <span>WhatsApp</span>
                    <small>Opens WhatsApp Web</small>
                </button>

                <button class="platform-btn fb-btn" data-platform="facebook">
                    <!-- Facebook logo -->
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                    <span>Facebook</span>
                    <small>Text copied + page opens</small>
                </button>

                <button class="platform-btn tt-btn" data-platform="tiktok">
                    <!-- TikTok logo -->
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.84 1.56V6.79a4.85 4.85 0 01-1.07-.1z"/>
                    </svg>
                    <span>TikTok</span>
                    <small>Caption copied to clipboard</small>
                </button>
            </div>

            <div class="share-feedback" id="shareFeedback"></div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="shareToast"></div>

    <script src="chart.umd.min.js"></script>
    <script src="statistics.js"></script>
</body>
</html>
